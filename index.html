<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ColdWatch</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#f3f6fa;
  color:#111827;
  overflow:hidden;
}
.header{
  height:105px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:18px 40px;
  background:white;
  border-bottom:4px solid #1687d9;
}
.logo{
  display:flex;
  align-items:center;
}
.logo img{
  height:75px;
  width:auto;
  object-fit:contain;
}
.top-numbers{
  display:flex;
  gap:45px;
  align-items:center;
  text-align:center;
}
.top-number{
  min-width:110px;
  border-left:1px solid #d1d5db;
  padding-left:30px;
}
.top-number strong{
  display:block;
  font-size:42px;
}
.green{color:#0a9f2e}
.time{
  font-size:26px;
  font-weight:bold;
}
.container{
  padding:28px 35px 20px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(5, 1fr);
  gap:20px;
}
.card{
  height:210px;
  background:white;
  border:1px solid #cfd8e3;
  border-radius:8px;
  padding:22px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  position:relative;
  overflow:hidden;
}
.card.active{
  border:2px solid #159a2f;
  box-shadow:0 0 0 2px rgba(21,154,47,.08),0 2px 10px rgba(0,0,0,.12);
}
.name{
  font-size:30px;
  font-weight:800;
}
.signal{
  position:absolute;
  right:20px;
  top:24px;
  font-size:25px;
  color:#7b8794;
}
.card.active .signal{color:#159a2f}
.status{
  margin-top:35px;
  font-size:25px;
  font-weight:800;
  color:#64748b;
}
.status .dot{
  display:inline-block;
  width:18px;
  height:18px;
  background:#64748b;
  border-radius:50%;
  margin-right:12px;
}
.card.active .status{color:#159a2f}
.card.active .dot{background:#159a2f}
.line{
  margin:24px 0 10px;
  height:1px;
  background:#d9dee7;
}
.temp{
  font-size:32px;
  font-weight:900;
  color:#64748b;
  line-height:1;
  margin-top:8px;
}
.card.active .temp{color:#159a2f}
.footer{
  height:70px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 40px;
  background:white;
  border-top:1px solid #d1d5db;
  font-size:22px;
}
.footer-left{
  display:flex;
  align-items:center;
  gap:14px;
}
.online-ball{
  width:28px;
  height:28px;
  border-radius:50%;
  background:#7ed321;
  border:4px solid #0a9f2e;
}
.offline-ball{
  background:#9ca3af;
  border-color:#64748b;
}
.footer-right{
  color:#374151;
  font-weight:600;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="logo.png" alt="ColdWatch">
  </div>

  <div class="top-numbers">
    <div class="top-number">
      <strong>10</strong>
      FREEZERS
    </div>
    <div class="top-number">
      <strong class="green" id="qtdOnline">0</strong>
      ONLINE
    </div>
    <div class="top-number">
      <strong id="qtdOffline">10</strong>
      OFFLINE
    </div>
    <div class="top-number">
      <div class="time" id="hora">--:--:--</div>
      <div id="data">--/--/----</div>
    </div>
  </div>
</div>

<div class="container">
  <div class="grid" id="freezers"></div>
</div>

<div class="footer">
  <div class="footer-left">
    <div id="bolaSistema" class="online-ball offline-ball"></div>
    <div id="textoSistema">Sistema Offline</div>
  </div>
  <div class="footer-right" id="ultimaLeitura">Última leitura: --:--:--</div>
</div>

<script>
const TOTAL = 10;

function criarCards(){
  const grid = document.getElementById("freezers");
  grid.innerHTML = "";

  for(let i = 1; i <= TOTAL; i++){
    const id = String(i).padStart(2, "0");
    const card = document.createElement("div");
    card.className = "card";
    card.id = "fz-" + id;

    card.innerHTML = `
      <div class="name">FZ-${id}</div>
      <div class="signal">▁▂▃▄</div>
      <div class="status"><span class="dot"></span>OFFLINE</div>
      <div class="line"></div>
      <div class="temp">--- °C</div>
    `;

    grid.appendChild(card);
  }
}

function atualizarRelogio(){
  const agora = new Date();
  document.getElementById("hora").innerHTML = agora.toLocaleTimeString("pt-BR");
  document.getElementById("data").innerHTML = agora.toLocaleDateString("pt-BR");
}

function horaAtualFormatada(){
  return new Date().toLocaleTimeString("pt-BR");
}

async function atualizarDados(){
  try{
    const resposta = await fetch("/status");
    const dados = await resposta.json();

    const online = dados.online;
    const valor = Number(dados.valor || 0);
    const temp = (-30 + (valor / 4095) * 40).toFixed(1).replace(".", ",");

    for(let i = 1; i <= TOTAL; i++){
      const id = String(i).padStart(2, "0");
      const card = document.getElementById("fz-" + id);

      if(i === 1 && online){
        card.className = "card active";
        card.querySelector(".status").innerHTML = '<span class="dot"></span>ONLINE';
        card.querySelector(".temp").innerHTML = temp + " °C";
      }else{
        card.className = "card";
        card.querySelector(".status").innerHTML = '<span class="dot"></span>OFFLINE';
        card.querySelector(".temp").innerHTML = "--- °C";
      }
    }

    document.getElementById("qtdOnline").innerHTML = online ? "1" : "0";
    document.getElementById("qtdOffline").innerHTML = online ? "9" : "10";

    document.getElementById("textoSistema").innerHTML = online ? "Sistema Online" : "Sistema Offline";
    document.getElementById("bolaSistema").className = online ? "online-ball" : "online-ball offline-ball";

    if(online){
      document.getElementById("ultimaLeitura").innerHTML = "Última leitura: " + horaAtualFormatada();
    }

  }catch(e){
    document.getElementById("qtdOnline").innerHTML = "0";
    document.getElementById("qtdOffline").innerHTML = "10";
    document.getElementById("textoSistema").innerHTML = "Erro de conexão";
    document.getElementById("bolaSistema").className = "online-ball offline-ball";
    document.getElementById("ultimaLeitura").innerHTML = "Última leitura: sem conexão";
  }
}

criarCards();
atualizarRelogio();
atualizarDados();

setInterval(atualizarRelogio, 1000);
setInterval(atualizarDados, 500);
</script>

</body>
</html>
